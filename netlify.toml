# Netlify config: deploy the frontend (client) only

[build]
  base    = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  # Set VITE_SIGNALING_URL to your backend URL (default: http://localhost:3001)
  NODE_VERSION = "20"

# SPA: all routes serve index.html (client-side routing if you add it later)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
