# Netlify config: deploy the frontend (client) only

[build]
  base    = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  # Frontend talks to Render backend in production
  VITE_SIGNALING_URL = "https://shadowroom.onrender.com"
  NODE_VERSION = "20"

# SPA: all routes serve index.html (client-side routing if you add it later)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
