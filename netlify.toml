# Netlify config: deploy the frontend (client) only

[build]
  base    = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  # Set in Netlify dashboard: VITE_SIGNALING_URL = your Render backend URL (e.g. https://your-app.onrender.com)
  NODE_VERSION = "20"

# SPA: all routes serve index.html (client-side routing if you add it later)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
