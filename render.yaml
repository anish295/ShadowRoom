# Render Blueprint: deploy the backend (server) only
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: shadowroom-signaling
    runtime: node

    # Backend lives in server/
    rootDir: server

    buildCommand: npm install
    startCommand: npm run start

    envVars:
      - key: NODE_VERSION
        value: 20
      # Optional: override port (default: 3001)
      # - key: PORT
      #   value: 3001
      # Optional: set CLIENT_ORIGIN for CORS (default: http://localhost:3000)
      # - key: CLIENT_ORIGIN
      #   value: http://localhost:3000
